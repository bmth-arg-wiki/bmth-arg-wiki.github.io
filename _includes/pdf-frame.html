<figure class="image wiki-pdf">
  <iframe
    class="wiki-pdf__iframe"
    style="width: 100%; min-height: 80vh; border: 0;"
    src="{{ include.src }}"
    title="{{ include.title | default: 'PDF Document' }}"
    loading="lazy"
    allowfullscreen
  >
  </iframe>

  {% if include.caption %}
    <figcaption class="has-text-centered is-size-7 mt-3">
      {{ include.caption }}
    </figcaption>
  {% endif %}
</figure>
